syntax = "proto2";

package gossamer.v1;

// https://github.com/paragonie/libgossamer/blob/master/docs/specification/Overview.md

// provider is the human readable form of an identity.
service GossamerService {
  rpc Action(ActionRequest) returns (ActionResponse);
  rpc GetLedger(GetLedgerRequest) returns (Ledger);
  rpc GetAttestation(AttestationRequest) returns (AttestationResponse);
}

message AttestationRequest {}

message AttestationResponse {
  // SHA-256 of the server container OCI image manifest.
  // Populated by the launcher from its own measurement of the container.
  optional bytes container_image_digest = 1;
  // GCA OIDC token (JWT) signed by Google's Confidential Computing attestation
  // service. The client verifies this JWT's signature via the GCA JWKS endpoint.
  // The aTLS binding (TLS pubkey hash) is embedded in the JWT's eat_nonce claim.
  // See: https://cloud.google.com/confidential-computing/confidential-vm/docs/token-claims
  optional string gca_token = 2;
}

enum Action {
	  ACTION_UNKNOWN = 0;
	  ACTION_APPEND_KEY = 1;
	  ACTION_REVOKE_KEY = 2;
}
message Message {
  optional bytes provider = 1;
  optional bytes public_key = 2;
  optional Action action = 3;
}

message SignedMessage {
  // Serialized `Message`.
  optional bytes contents = 1;
  optional bytes signature = 2;
  optional bytes identity_key = 3;
}

message ActionRequest {
  optional SignedMessage message = 1;
}

message ActionResponse {}

message GetLedgerRequest {}

message User {
  optional bytes provider = 1;
  repeated bytes public_keys = 2;
}

message Ledger {
  repeated User users = 1;
}

